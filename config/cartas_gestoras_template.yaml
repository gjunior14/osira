# =============================================================================
# RESUMO DO MÊS (Preencher após ler todas as cartas)
# =============================================================================

resumo_mensal:
  # Consenso macro Brasil
  consenso_brasil:
    juros: null                      # Maioria das casas
    fiscal: null
    cambio: null

  # Consenso macro US
  consenso_us:
    economia: null
    fed: null

  # Consenso posicionamento
  consenso_posicoes:
    renda_fixa_brasil: null
    acoes_brasil: null
    dolar: null
    acoes_us: null

  # Divergências importantes (listar)
  divergencias:
    - null

  # Flags para review (se sua posição contradiz)
  flags_review:
    - null

# =============================================================================
# INSTRUÇÕES DE PREENCHIMENTO
# =============================================================================
#
# 1. Ao ler cada carta, preencha a seção correspondente
# 2. Use os valores padronizados:
#    - Juros: dovish | neutro | hawkish
#    - Fiscal: otimista | neutro | preocupado | pessimista
#    - Posições: muito_vendido | vendido | neutro | comprado | muito_comprado
#    - Economia: recessao | soft_landing | no_landing
#
# 3. Quotes: Apenas frases realmente relevantes (máx 3)
#
# 4. Confiança: 0-1, baseado em:
#    - Clareza da mensagem
#    - Track record recente
#    - Quão convictos parecem
#
# 5. No final do mês, preencha resumo_mensal
#
# 6. Compare com suas posições e preencha flags_review se necessário
#
# =============================================================================
