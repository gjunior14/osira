# =============================================================================
# CARTAS DE GESTORAS - Template de Input Manual
# =============================================================================
# Atualizar mensalmente (10-15 min) com base nas cartas que você já lê.
#
# USO: VALIDAÇÃO/VETO, não trigger de compra!
# - Se sua posição contradiz Verde + SPX + Kinea → review obrigatório
# - Se consenso cartas confirma sua posição → confiança maior
#
# Edge real: ~25% (validação qualitativa)
#
# =============================================================================
# FONTES DE CARTAS
# =============================================================================
# PRINCIPAL: Telegram "CARTAS - Leia as Cartas dos Gestores"
#   - Link: https://linktr.ee/danielgues (procurar "CARTAS")
#   - Conteúdo: Cartas dos principais fundos BR e exterior
#   - Atualização: Postagens diárias
#
# ALTERNATIVAS:
#   - Sites de RI das gestoras
#   - Mailing lists das assets
#   - InfoMoney / Valor Econômico (resumos)
#
# OUTROS GRUPOS ÚTEIS DO MESMO AUTOR:
#   - "MACRO - Macroeconomia & News" - notícias macro
#   - "FIIs, Renda Fixa, Leilões, Imóveis etc" - renda fixa
#   - "RELATÓRIOS FINANCEIROS" - releases e apresentações (R$ 15/mês)
#   - "BIBLIOTECA - Biblioteca Financeira" - livros e materiais
# =============================================================================

data_atualizacao: "2026-01-15"
periodo_referencia: "Janeiro 2026"

# =============================================================================
# GESTORAS BRASILEIRAS
# =============================================================================

gestoras_brasil:
  # ---------------------------------------------------------------------------
  # VERDE ASSET (Luis Stuhlberger)
  # ---------------------------------------------------------------------------
  - nome: "Verde Asset"
    carta_data: "2026-01-10"

    # Visão macro
    macro:
      brasil_juros: "hawkish"        # dovish | neutro | hawkish
      brasil_fiscal: "preocupado"    # otimista | neutro | preocupado | pessimista
      brasil_cambio: "neutro"        # otimista | neutro | pessimista
      us_economia: "soft_landing"    # recessao | soft_landing | no_landing
      us_fed: "neutro"               # dovish | neutro | hawkish

    # Posicionamento
    posicoes:
      renda_fixa_brasil: "comprado"       # muito_vendido | vendido | neutro | comprado | muito_comprado
      acoes_brasil: "neutro"
      dolar: "neutro"
      acoes_us: "neutro"
      commodities: "neutro"

    # Setores (se mencionado)
    setores:
      overweight: []
      underweight: []

    # Quotes chave (máx 3)
    quotes:
      - "Juro real acima de 7% é atrativo para longo prazo"

    # Nível de confiança da carta (0-1)
    confianca: 0.7

    comentario: "Carta cautelosa mas construtiva para RF longa"

